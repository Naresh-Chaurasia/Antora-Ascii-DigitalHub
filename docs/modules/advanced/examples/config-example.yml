# Example Configuration File
project:
  name: "Example Project"
  version: "1.0.0"
  description: "A sample configuration"

build:
  output: "dist/"
  minify: true
  sourcemap: false

dev:
  port: 3000
  host: "localhost"
  open: true

plugins:
  - name: "analytics"
    config:
      tracking_id: "GA-XXXXXXX"
  - name: "seo"
    config:
      sitemap: true
      robots: true